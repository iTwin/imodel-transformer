name: Publish NPM packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-packages:
    runs-on: ubuntu-latest

    name: Release packages
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.IMJS_ADMIN_GH_TOKEN }}
        fetch-depth: 0

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js 24
      uses: actions/setup-node@v3
      with:
        node-version: 24.18.0
        registry-url: https://registry.npmjs.org/

    - name: Install dependencies
      run: pnpm install

    - name: Build
      run: pnpm run build

    - name: Lint
      run: pnpm run lint

    - name: Test
      run: pnpm run test

    - name: Capture previous stable version
      id: prev
      run: |
        prevVersion=$(git tag --list '@itwin/imodel-transformer_v*' | grep -vE '\-' | sed 's#.*_v##' | sort -V | tail -1)
        echo "version=${prevVersion}" >> "$GITHUB_OUTPUT"
        echo "Previous stable version: ${prevVersion:-<none>}"

    - name: Publish packages
      run: |
        git config --local user.email imodeljs-admin@users.noreply.github.com
        git config --local user.name imodeljs-admin
        pnpm publish-packages -y --branch ${{ github.ref_name }} --message "Version bump [skip actions][publish docs]"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPMJS_PUBLISH_ITWIN }}

    - name: Create GitHub release
      run: node .github/workflows/scripts/create-github-release.mjs "${{ steps.prev.outputs.version }}"
      env:
        GH_TOKEN: ${{ secrets.IMJS_ADMIN_GH_TOKEN }}
