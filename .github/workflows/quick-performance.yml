name: Quick performance

on:
  workflow_dispatch:

jobs:
  balanced-incremental:
    name: Balanced incremental
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build transformer
        run: pnpm --dir packages/transformer build:cjs

      - name: Validate quick harness
        run: >-
          pnpm --dir packages/performance-tests exec mocha
          --timeout 300000
          --require ts-node/register
          test/quick/FixtureManifest.quick-unit.ts
          test/quick/statistics.quick-unit.ts
          test/quick/LocalHubFixture.quick-unit.ts

      - name: Run quick performance suite
        run: pnpm --dir packages/performance-tests test:quick
        env:
          QUICK_PERF_OUTPUT: ${{ runner.temp }}/quick-performance

      - name: Report variance reliability
        if: always()
        shell: pwsh
        run: |
          $report = "${{ runner.temp }}/quick-performance/summary.json"
          if (Test-Path $report) {
            $summary = Get-Content $report | ConvertFrom-Json
            "### Quick performance reliability" >> $env:GITHUB_STEP_SUMMARY
            "Status: **$($summary.varianceStatus)**" >> $env:GITHUB_STEP_SUMMARY
            "CV: $($summary.wallMilliseconds.coefficientOfVariation)" >> $env:GITHUB_STEP_SUMMARY
            "Normalized MAD: $($summary.wallMilliseconds.normalizedMad)" >> $env:GITHUB_STEP_SUMMARY
            "Unstable samples: $($summary.unstableSamples -join ', ')" >> $env:GITHUB_STEP_SUMMARY
            if ($summary.varianceStatus -ne "stable") {
              Write-Output "::warning title=Unstable quick performance variance::Do not use this run as regression evidence."
            }
          }

      - name: Publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: QuickPerformanceReport
          path: |
            ${{ runner.temp }}/quick-performance/samples.jsonl
            ${{ runner.temp }}/quick-performance/summary.json
            ${{ runner.temp }}/quick-performance/summary.csv
